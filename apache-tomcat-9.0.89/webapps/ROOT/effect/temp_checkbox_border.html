<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox - 순수 CSS Border 트릭 방식</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f6f6f7;
            padding: 40px;
            color: #303030;
        }
        h2 { margin-bottom: 8px; font-size: 20px; }
        p.desc { color: #6d7175; font-size: 13px; margin-bottom: 24px; }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.07);
            max-width: 480px;
        }
        h3 { margin: 28px 0 12px; font-size: 13px; color: #6d7175; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ============================================
           순수 CSS Border 트릭 방식 체크박스
           ============================================
           
           원리:
           - SVG도, mask-image도, 이미지도 전혀 사용하지 않음
           - ::after 가상 요소의 border-left와 border-bottom만으로
             "ㄴ" 모양을 만든 뒤, rotate(-45deg)로 회전하면 "✓" 체크 모양이 됨
           - 불확정(-) 아이콘도 border-bottom 하나만으로 표현
        */

        .polaris-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 4px 0;
            cursor: pointer;
        }
        .polaris-checkbox + .polaris-checkbox { margin-top: 12px; }

        /* 네이티브 체크박스 숨김 */
        .polaris-checkbox input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* 커스텀 체크박스 외곽 */
        .checkmark {
            position: relative;
            display: inline-block;
            width: 18px;
            height: 18px;
            min-width: 18px;
            border: 2px solid #8c9196;
            border-radius: 4px;
            background-color: #fff;
            margin-top: 2px;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }

        /* 
           핵심: ::after + border 트릭으로 체크(✓) 모양 만들기
           
           1. 가로 6px × 세로 10px 크기의 빈 박스를 만듦
           2. border-left(왼쪽 선)과 border-bottom(아래쪽 선)만 그림 → "ㄴ" 모양
           3. rotate(45deg)로 45도 회전 → "✓" 모양 완성!
        */
        .checkmark::after {
            content: "";
            position: absolute;
            
            /* 체크 모양의 크기 (가로 × 세로) */
            width: 5px;
            height: 9px;

            /* "ㄴ" 모양: 왼쪽 선 + 아래쪽 선 */
            border: solid #fff;
            border-width: 0 2px 2px 0;
            
            /* 45도 회전하여 체크(✓) 모양으로 변환 */
            transform: rotate(45deg);

            /* 박스 중앙에 배치 (시각적 미세 보정 포함) */
            top: 1px;
            left: 5px;
            
            /* 기본 상태: 숨김 */
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        /* 체크됨 상태 */
        .polaris-checkbox input:checked + .checkmark {
            background-color: #2c6ecb;
            border-color: #2c6ecb;
        }
        .polaris-checkbox input:checked + .checkmark::after {
            opacity: 1;
        }

        /* 호버 */
        .polaris-checkbox:hover .checkmark {
            border-color: #2c6ecb;
        }
        .polaris-checkbox:hover input:checked + .checkmark {
            background-color: #1f5199;
            border-color: #1f5199;
        }

        /* 포커스 */
        .polaris-checkbox input:focus-visible + .checkmark {
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px #2c6ecb;
        }

        /* 
           불확정(Indeterminate) 상태 
           - 체크(✓) 대신 가운데에 가로줄(-) 하나만 표시
           - border-bottom만 사용하고, rotate 없이 가로로 표현
        */
        .polaris-checkbox input.indeterminate + .checkmark {
            background-color: #2c6ecb;
            border-color: #2c6ecb;
        }
        .polaris-checkbox input.indeterminate + .checkmark::after {
            /* 체크 모양 대신 가로줄로 변경 */
            width: 8px;
            height: 0;
            border-width: 0 0 2px 0; /* 아래 선만 (가로줄) */
            transform: none;          /* 회전 제거 */
            top: 6px;
            left: 3px;
            opacity: 1;
        }

        /* 비활성화 */
        .polaris-checkbox.disabled { cursor: not-allowed; opacity: 0.6; }
        .polaris-checkbox.disabled .checkmark { background-color: #f1f1f1; border-color: #c9cccf; }

        /* 에러 */
        .polaris-checkbox.error .checkmark { border-color: #d72c0d; }
        .error-message { font-size: 13px; color: #d72c0d; margin-top: 4px; }

        /* 라벨 */
        .checkbox-label-area { display: flex; flex-direction: column; }
        .checkbox-label { font-size: 14px; color: #303030; line-height: 20px; }
        .checkbox-details { font-size: 13px; color: #6d7175; margin-top: 2px; }
        .divider { border: none; border-top: 1px solid #e1e3e5; margin: 12px 0; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            background: #fff3cd;
            color: #856404;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }

        /* 원리 설명용 시각화 */
        .demo-area {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-top: 20px;
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }
        .demo-step {
            text-align: center;
            font-size: 12px;
            color: #6d7175;
        }
        .demo-step .box {
            display: inline-block;
            position: relative;
            width: 40px;
            height: 40px;
            border: 2px solid #ccc;
            border-radius: 6px;
            margin-bottom: 6px;
        }
        .demo-step .box::after {
            content: "";
            position: absolute;
        }
        .step1 .box::after {
            width: 12px; height: 22px;
            border: solid #2c6ecb; border-width: 0 3px 3px 0;
            top: 4px; left: 12px;
        }
        .step2 .box::after {
            width: 12px; height: 22px;
            border: solid #2c6ecb; border-width: 0 3px 3px 0;
            transform: rotate(45deg);
            top: 2px; left: 13px;
        }
        .demo-arrow { font-size: 24px; color: #aaa; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>순수 CSS Border 트릭 방식 <span class="badge">border only</span></h2>
    <p class="desc">
        SVG도, 이미지도, mask도 전혀 사용하지 않습니다.<br>
        오직 CSS <code>border-left</code> + <code>border-bottom</code> + <code>rotate(45deg)</code>만으로 체크(✓) 모양을 만듭니다.
    </p>

    <!-- 원리 시각화 -->
    <h3>원리 시각화</h3>
    <div class="card">
        <div class="demo-area">
            <div class="demo-step step1">
                <div class="box"></div>
                <div>1. border로 "ㄴ" 모양</div>
            </div>
            <div class="demo-arrow">→</div>
            <div class="demo-step step2">
                <div class="box"></div>
                <div>2. rotate(45deg) → "✓"</div>
            </div>
        </div>
    </div>

    <h3>기본 / 체크됨</h3>
    <div class="card">
        <label class="polaris-checkbox">
            <input type="checkbox">
            <span class="checkmark"></span>
            <span class="checkbox-label-area">
                <span class="checkbox-label">확인 단계 필요</span>
                <span class="checkbox-details">진행하기 전에 모든 기준이 충족되었는지 확인합니다</span>
            </span>
        </label>
        <label class="polaris-checkbox">
            <input type="checkbox" checked>
            <span class="checkmark"></span>
            <span class="checkbox-label-area">
                <span class="checkbox-label">이미 체크된 항목 (checked)</span>
            </span>
        </label>
    </div>

    <h3>불확정 상태 (Indeterminate)</h3>
    <div class="card">
        <label class="polaris-checkbox">
            <input type="checkbox" id="selectAll-border">
            <span class="checkmark"></span>
            <span class="checkbox-label-area"><span class="checkbox-label">모두 선택</span></span>
        </label>
        <hr class="divider">
        <label class="polaris-checkbox"><input type="checkbox" class="child-border"><span class="checkmark"></span><span class="checkbox-label-area"><span class="checkbox-label">항목 1</span></span></label>
        <label class="polaris-checkbox"><input type="checkbox" class="child-border"><span class="checkmark"></span><span class="checkbox-label-area"><span class="checkbox-label">항목 2</span></span></label>
        <label class="polaris-checkbox"><input type="checkbox" class="child-border"><span class="checkmark"></span><span class="checkbox-label-area"><span class="checkbox-label">항목 3</span></span></label>
    </div>

    <h3>에러 / 비활성화</h3>
    <div class="card">
        <label class="polaris-checkbox error">
            <input type="checkbox">
            <span class="checkmark"></span>
            <span class="checkbox-label-area">
                <span class="checkbox-label">이용약관에 동의합니다</span>
                <span class="error-message">계속하려면 약관에 동의해야 합니다</span>
            </span>
        </label>
        <label class="polaris-checkbox disabled">
            <input type="checkbox" disabled>
            <span class="checkmark"></span>
            <span class="checkbox-label-area">
                <span class="checkbox-label">고급 설정 (비활성화)</span>
            </span>
        </label>
    </div>

    <script>
        const selectAll = document.getElementById('selectAll-border');
        const children = document.querySelectorAll('.child-border');
        function update() {
            const total = children.length;
            const checked = document.querySelectorAll('.child-border:checked').length;
            if (checked === 0) { selectAll.checked = false; selectAll.classList.remove('indeterminate'); }
            else if (checked === total) { selectAll.checked = true; selectAll.classList.remove('indeterminate'); }
            else { selectAll.checked = false; selectAll.classList.add('indeterminate'); }
        }
        selectAll.addEventListener('change', () => { selectAll.classList.remove('indeterminate'); children.forEach(c => c.checked = selectAll.checked); });
        children.forEach(c => c.addEventListener('change', update));
    </script>
</body>
</html>
