<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio - 순수 CSS Border 트릭 방식</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f6f6f7; padding: 40px; color: #303030;
        }
        h2 { margin-bottom: 8px; font-size: 20px; }
        p.desc { color: #6d7175; font-size: 13px; margin-bottom: 24px; }
        h3 { margin: 28px 0 12px; font-size: 13px; color: #6d7175; text-transform: uppercase; letter-spacing: 0.5px; }
        .card {
            background: #fff; border-radius: 12px; padding: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.07);
            max-width: 480px;
        }
        .badge {
            display: inline-block; padding: 2px 8px; background: #fff3cd; color: #856404;
            border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 6px;
        }

        /* ============================================
           순수 CSS Border 트릭 방식 라디오 버튼
           ============================================
           원리:
           - SVG도, mask도, 이미지도 전혀 사용하지 않음
           - ::after 가상 요소에 width, height, border-radius: 50%만으로
             내부 원(dot)을 표현
           - 라디오 버튼은 "ㄴ" 모양이 필요 없으므로 체크박스보다 더 간단!
             단순히 작은 원을 그리면 됨
        */

        .polaris-radio {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 4px 0; cursor: pointer;
        }
        .polaris-radio + .polaris-radio { margin-top: 12px; }

        .polaris-radio input[type="radio"] {
            position: absolute; opacity: 0; width: 0; height: 0;
        }

        .radiomark {
            position: relative;
            display: inline-block;
            width: 18px; height: 18px; min-width: 18px;
            border: 2px solid #8c9196; border-radius: 50%;
            background-color: #fff; margin-top: 2px;
            transition: border-color 0.15s ease;
        }

        /* 
           핵심: ::after에 작은 원(dot)을 만들어 중앙에 배치
           - width/height로 원의 크기 지정
           - border-radius: 50%로 완전한 원형
           - background-color로 색상 부여
           - 위치는 top/left + transform으로 완벽한 중앙 배치
        */
        .radiomark::after {
            content: "";
            position: absolute;
            
            /* 내부 원(dot)의 크기 */
            width: 10px;
            height: 10px;
            
            /* 원형으로 만들기 */
            border-radius: 50%;
            
            /* 원의 색상 */
            background-color: #2c6ecb;

            /* 정확한 중앙 배치 */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);

            /* 기본 숨김 + 애니메이션 */
            opacity: 0;
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        /* 선택됨 */
        .polaris-radio input:checked + .radiomark { border-color: #2c6ecb; }
        .polaris-radio input:checked + .radiomark::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 호버 */
        .polaris-radio:hover .radiomark { border-color: #2c6ecb; }
        .polaris-radio:hover input:checked + .radiomark { border-color: #1f5199; }
        .polaris-radio:hover input:checked + .radiomark::after { background-color: #1f5199; }

        /* 포커스 */
        .polaris-radio input:focus-visible + .radiomark {
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px #2c6ecb;
        }

        /* 비활성화 */
        .polaris-radio.disabled { cursor: not-allowed; opacity: 0.6; }
        .polaris-radio.disabled .radiomark { background-color: #f1f1f1; border-color: #c9cccf; }
        .polaris-radio.disabled:hover .radiomark { border-color: #c9cccf; }

        /* 에러 */
        .polaris-radio.error .radiomark { border-color: #d72c0d; }
        .error-message { font-size: 13px; color: #d72c0d; margin-top: 4px; }

        /* 라벨 */
        .radio-label-area { display: flex; flex-direction: column; }
        .radio-label { font-size: 14px; color: #303030; line-height: 20px; }
        .radio-details { font-size: 13px; color: #6d7175; margin-top: 2px; }

        /* 원리 시각화 */
        .demo-area {
            display: flex; align-items: center; gap: 30px;
            margin-top: 16px; padding: 20px; background: #fafafa;
            border-radius: 8px; border: 1px dashed #ccc;
        }
        .demo-step { text-align: center; font-size: 12px; color: #6d7175; }
        .demo-circle-outer {
            display: inline-block; width: 50px; height: 50px;
            border: 3px solid #8c9196; border-radius: 50%; margin-bottom: 6px;
            position: relative;
        }
        .demo-circle-inner {
            width: 26px; height: 26px; background-color: #2c6ecb;
            border-radius: 50%; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .demo-arrow { font-size: 24px; color: #aaa; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>순수 CSS Border 트릭 방식 라디오 <span class="badge">border only</span></h2>
    <p class="desc">
        SVG도, 이미지도, mask도 전혀 사용하지 않습니다.<br>
        <code>::after</code> 가상 요소에 <code>width</code> + <code>height</code> + <code>border-radius: 50%</code>만으로 내부 원(dot)을 표현합니다.<br>
        라디오 버튼은 체크박스와 달리 "✓" 모양이 필요 없어서 <b>가장 간단한 구현</b>입니다.
    </p>

    <!-- 원리 시각화 -->
    <h3>원리 시각화</h3>
    <div class="card">
        <div class="demo-area">
            <div class="demo-step">
                <div class="demo-circle-outer"></div>
                <div>1. 원형 외곽 (border-radius: 50%)</div>
            </div>
            <div class="demo-arrow">+</div>
            <div class="demo-step">
                <div class="demo-circle-outer">
                    <div class="demo-circle-inner"></div>
                </div>
                <div>2. ::after로 내부 원(dot) 추가</div>
            </div>
        </div>
    </div>

    <h3>기본 선택</h3>
    <div class="card">
        <label class="polaris-radio">
            <input type="radio" name="plan-border" checked>
            <span class="radiomark"></span>
            <span class="radio-label-area">
                <span class="radio-label">기본 플랜</span>
                <span class="radio-details">월 29,000원 - 소규모 비즈니스에 적합</span>
            </span>
        </label>
        <label class="polaris-radio">
            <input type="radio" name="plan-border">
            <span class="radiomark"></span>
            <span class="radio-label-area">
                <span class="radio-label">프로 플랜</span>
                <span class="radio-details">월 79,000원 - 성장하는 비즈니스에 적합</span>
            </span>
        </label>
        <label class="polaris-radio">
            <input type="radio" name="plan-border">
            <span class="radiomark"></span>
            <span class="radio-label-area">
                <span class="radio-label">엔터프라이즈 플랜</span>
                <span class="radio-details">맞춤형 가격 - 대규모 비즈니스에 적합</span>
            </span>
        </label>
    </div>

    <h3>에러 / 비활성화</h3>
    <div class="card">
        <label class="polaris-radio error">
            <input type="radio" name="terms-border">
            <span class="radiomark"></span>
            <span class="radio-label-area">
                <span class="radio-label">동의합니다</span>
                <span class="error-message">항목을 선택해야 합니다</span>
            </span>
        </label>
        <label class="polaris-radio disabled">
            <input type="radio" name="disabled-border" disabled>
            <span class="radiomark"></span>
            <span class="radio-label-area">
                <span class="radio-label">비활성화된 옵션</span>
                <span class="radio-details">관리자에게 문의하세요</span>
            </span>
        </label>
    </div>

</body>
</html>
