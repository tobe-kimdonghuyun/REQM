<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ant Design Navigation Clone</title>
    <style>
        /* 기본 리셋 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 50px;
            background-color: #f5f5f5;
        }

        /* 1. 네비게이션 컨테이너 (Ant Design의 메뉴 헤더 영역 역할) */
        .ant-nav-container {
            display: flex;
            align-items: center;
            gap: 16px; /* 앞서 살펴본 ant-flex-gap-middle */
            background-color: transparent;
            border-bottom: 1px solid rgba(5, 5, 5, 0.06); /* 연한 하단 구분선 */
            padding: 0 40px;
            height: 64px; /* Ant Design 헤더 기본 높이 */
            background: #fff;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03); /* 가벼운 그림자 */
        }

        /* 2. 네비게이션 메뉴 아이템 */
        .ant-nav-item {
            position: relative; /* 밑줄(::after)의 기준점 */
            display: flex;
            align-items: center;
            height: 100%; /* 부모(컨테이너)의 높이 64px를 가득 채움 */
            padding: 0 20px;
            color: rgba(0, 0, 0, 0.88); /* 기본 글자색 (완전한 검은색이 아님) */
            font-size: 14px;
            cursor: pointer;
            transition: color 0.3s cubic-bezier(0.645, 0.045, 0.355, 1); /* 색상 변경 시 부드러운 전환 (Ant Design 특유의 타이밍 함수) */
        }

        /* 3. 마우스 오버(Hover) 시 효과 */
        .ant-nav-item:hover {
            color: #1677ff; /* Ant Design 기본 Primary Color (파란색) */
        }

        /* 4. 하단 밑줄 애니메이션 (핵심!) 
           가상 요소(::after)를 사용하여 눈에 보이지 않는 바(bar)를 만들어 둡니다. */
        .ant-nav-item::after {
            content: "";
            position: absolute;
            bottom: -1px; /* border-bottom을 덮도록 -1px 위치 */
            left: 20px;   /* padding만큼 띄움 */
            right: 20px;
            height: 2px;
            background-color: transparent; /* 초기에는 투명 */
            
            /* 핵심: 밑줄도 부드럽게 나타나도록 트랜지션 적용 */
            transition: background-color 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        /* 호버 시 혹은 active(선택됨) 상태일 때 밑줄 색상 채우기 */
        .ant-nav-item:hover::after,
        .ant-nav-item.active::after {
            background-color: #1677ff; 
        }

        /* 5. 활성화(선택된 메뉴) 상태 색상 */
        .ant-nav-item.active {
            color: #1677ff;
            font-weight: 500;
        }

    </style>
</head>
<body>

    <h2>Ant Design Navigation Bar (Menu) 모방 샘플</h2>
    <p>
        Ant Design 홈페이지 상단 메뉴의 "마우스 오버 시 푸른색상 변화" 및 "하단 밑줄(Indicator) 애니메이션" 효과를 구현했습니다.
    </p>
    
    <div class="ant-nav-container">
        <!-- 첫 번째 항목은 디자인(Active) 메뉴라고 가정 -->
        <div class="ant-nav-item active">
            Design
        </div>
        
        <div class="ant-nav-item">
            Development
        </div>
        
        <div class="ant-nav-item">
            Components
        </div>
        
        <div class="ant-nav-item">
            Blog
        </div>
        
        <div class="ant-nav-item" style="color: rgba(0, 0, 0, 0.45); cursor: not-allowed;">
            Disabled
        </div>
    </div>

    <script>
        // 간단한 클릭 인터랙션 스크립트 (클릭 시 active 클래스 이동)
        const navItems = document.querySelectorAll('.ant-nav-item');
        
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                // Disabled 항목 무시
                if(this.style.cursor === 'not-allowed') return;

                // 모든 항목에서 active 클래스 제거
                document.querySelectorAll('.ant-nav-item').forEach(el => {
                    el.classList.remove('active');
                });
                // 클릭한 항목에만 active 클래스 추가
                this.classList.add('active');
            });
        });
    </script>

</body>
</html>
