	<script>
		var urlParams = {};
		(function () {
			var match,
			pl     = /\+/g,
			search = /([^&=]+)=?([^&]*)/g,
			decode = function (s) { return decodeURIComponent(s.replace(pl, " ")); },
			query  = window.location.search.substring(1);
			while (match = search.exec(query)) { urlParams[decode(match[1])] = decode(match[2]); }
			})();
			
			let nexacroApp = document.getElementById('nexacroContainer00');			
			if (urlParams.formname) nexacroApp.setAttribute('data-fdl', urlParams.formname);
