<head>
  <meta charset="UTF-8" />
  <title>MFE 샘플 - Shell</title>
  <style>
    body { font-family: -apple-system, "Malgun Gothic", sans-serif; margin: 0; color: #1f2937; }
    header { display: flex; align-items: center; gap: 1.5rem; padding: 1rem 1.5rem; background: #111827; color: #fff; }
    header a { color: #fff; text-decoration: none; }
    header a:hover { text-decoration: underline; }

    .remote-boundary { padding: 1rem; border: 2px dashed #4f46e5; border-radius: 8px; margin-top: 1rem; }
    .remote-tag { margin: 0 0 0.75rem; font-size: 12px; color: #4f46e5; }
    .error-boundary { padding: 1rem; border: 2px solid #dc2626; border-radius: 8px; background: #fef2f2; color: #991b1b; }
    .placeholder-box { padding: 1.25rem; border: 2px dashed #9ca3af; border-radius: 8px; color: #4b5563; background: #f9fafb; }
